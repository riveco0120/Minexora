<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
  <title>Minexora</title>
  <link rel="stylesheet" href="css/estyleLogin.css">
</head>

<body>
  <header>
    <div class="contenedor">
      <nav class="menu">
        <a href="index.html" id="btn-Login">Inicio</a>
        <a href="#" id="btn-Login">Contactanos</a>
      </nav>
      <div class="login-container">
    <h2>Iniciar Sesión</h2>
    <form novalidate>
      <div class="form-group">
        <label for="usuario">Usuario o Correo</label>
        <input type="text" id="usuario" name="usuario" required placeholder="ej: nombre@correo.com">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required placeholder="********">
      </div>

      <div class="botones">
  <button type="submit">Ingresar</button>
  <button type="button" onclick="window.location.href='creationUser.html'">Registrarse</button>
</div>
    </form>
  </div>
  </div>
  <footer>
		<div class="contenedor">
			<div class="copyright">
				<p>Copyright Minexora @ 2025</p>
			</div>
		</div>
	</footer>
  </header>
  
  

</body>

</html>
